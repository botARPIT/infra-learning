name: CI

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: admin
          POSTGRES_DB: jobs
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U admin"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7
        ports:
          - 6379:6379

    env:
      DATABASE_URL: postgresql://admin:admin@localhost:5432/jobs
      REDIS_HOST: localhost

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run migrations
        run: alembic upgrade head

      - name: Build docker image
        run: docker build -t infra-learning .

      - name: Create placeholder env file
        run: |
          cat > .env.runtime <<EOF
          DATABASE_URL=dummy
          REDIS_HOST=dummy
          EOF

      - name: Validate compose
        run: docker compose -f docker-compose.base.yml -f docker-compose.vpc.yml config
