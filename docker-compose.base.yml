version: "3.9"

x-app-build: &app-build
  build: .
  restart: unless-stopped
services:
  api:
    <<: *app-build
    command: uvicorn api.app.main:app --host 0.0.0.0 --port 8002
    ports:
      - "8002:8002"
  worker:
    <<: *app-build
    command: python -m api.app.worker_runner

  reaper:
    <<: *app-build
    command: python -m api.app.reaper
