version: "3.9"

x-app-build: &app-build
  build: .
  restart: unless-stopped
services:
  api:
    <<: *app-build
    command: sh -c "alembic upgrade head && uvicorn api.app.main:app --host 0.0.0.0 --port 8002"
    ports:
      - "8002:8002"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 10s
      timeout: 5s
      retries: 3
  worker:
    <<: *app-build
    command: python -m api.worker.run

  reaper:
    <<: *app-build
    command: python -m api.reaper.reaper
