services:
  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 30s
      retries: 5

  prometheus:
    image: prom/prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy

  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    restart: unless-stopped

  api:
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - .env.runtime

  worker:
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - .env.runtime

  reaper:
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - .env.runtime
