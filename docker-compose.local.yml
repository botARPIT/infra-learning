version: "3.9"

x-app-env: &app-env
  DATABASE_URL: postgresql://admin@postgres:5432/jobs
  REDIS_HOST: redis
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: jobs
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 5s
      timeout: 30s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 30s
      retries: 5

  prometheus:
    image: prom/prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    restart:
      - unless-stopped

  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    restart:
      - unless-stopped
  api:
    depends_on:
      - postgres
      - redis
    environment:
      <<: *app-env

  worker:
    depends_on:
      - redis
      - postgres
    environment:
      <<: *app-env

  reaper:
    depends_on:
      - redis
      - postgres
    environment:
      <<: *app-env

volumes:
  postgres_data:
